name: NoteV
options:
  bundleIdPrefix: com.notev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "6CNNH94AD6"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: NoteV/Config/Info.plist

packages:
  MWDATCore:
    url: https://github.com/facebook/meta-wearables-dat-ios
    exactVersion: "0.4.0"

targets:
  NoteV:
    type: application
    platform: iOS
    sources:
      - path: NoteV
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notev.app
        INFOPLIST_FILE: NoteV/Config/Info.plist
        CODE_SIGN_ENTITLEMENTS: NoteV/Config/NoteV.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MWDATCore
        product: MWDATCore
      - package: MWDATCore
        product: MWDATCamera

  NoteVTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NoteVTests
    dependencies:
      - target: NoteV
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notev.app.tests
